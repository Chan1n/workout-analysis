name: Workout Graph

on: 
  push

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Download repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install packages
        run: pip install pandas matplotlib

      - name: Run script
        run: python workout_graph.py
